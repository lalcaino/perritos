name: Deploy Backend to ECR and EC2

on:
  push:
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1  # <--- FUÉRZALO AQUÍ DIRECTAMENTE PARA EVITAR ERRORES DE SECRETS

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to ECR
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO_URL_BACKEND }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.INSTANCE_ID_BACKEND }}" \
            --document-name "AWS-RunShellScript" \
            --region us-east-1 \
            --parameters 'commands=[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_URL_BACKEND }}:latest",
              "docker stop backend-container || true",
              "docker rm backend-container || true",
              "docker run -d --name backend-container -p 3001:3001 -e DB_HOST=${{ secrets.DB_HOST_IP }} -e DB_USER=postgres -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_URL_BACKEND }}:latest"
            ]'
